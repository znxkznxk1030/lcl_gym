<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossDock 3D Simulation Viewer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#090d14;
  color:#dce8ff;
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;
  user-select:none;
}
#canvas-wrap { position:fixed; inset:0; }

/* ── Header ── */
#header {
  position:fixed; top:0; left:0; right:0;
  padding:10px 18px;
  background:rgba(9,13,20,.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex; align-items:center; justify-content:space-between;
  z-index:100;
}
#header h1 { font-size:14px; font-weight:700; color:#7eb8f7; letter-spacing:.6px; }
#header-meta { font-size:11px; color:#5577aa; }

/* ── Panels ── */
.panel {
  position:fixed;
  background:rgba(9,13,20,.88);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.09);
  border-radius:8px; padding:13px;
  z-index:100;
}
.ptitle {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:#5599ee; margin-bottom:10px;
}
.row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.lbl { font-size:11px; color:#6688aa; }
.val { font-size:12px; font-weight:600; color:#dce8ff; font-variant-numeric:tabular-nums; }
.bar-wrap { height:4px; background:rgba(255,255,255,.1); border-radius:2px; margin-bottom:8px; overflow:hidden; }
.bar { height:100%; border-radius:2px; transition:width .35s ease; }

#step-panel { top:52px; left:14px; width:210px; }
#metrics-panel { top:52px; right:14px; width:210px; }
#legend { bottom:88px; left:14px; }

.lane-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.lane-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.lane-txt { font-size:11px; color:#7799bb; font-variant-numeric:tabular-nums; }

.door-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.door-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.door-txt { font-size:11px; color:#7799bb; }

/* ── Timeline ── */
#timeline {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(9,13,20,.92);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.08);
  padding:10px 18px; z-index:100;
}
#ctrl-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.btn {
  background:rgba(126,184,247,.12); border:1px solid rgba(126,184,247,.28);
  color:#7eb8f7; border-radius:4px; padding:3px 10px;
  font-size:12px; cursor:pointer; transition:background .2s;
}
.btn:hover { background:rgba(126,184,247,.28); }
.btn:active { background:rgba(126,184,247,.4); }
#step-disp { font-size:12px; font-weight:700; color:#7eb8f7; font-variant-numeric:tabular-nums; min-width:90px; }
#spd-lbl { font-size:11px; color:#4466aa; min-width:36px; text-align:right; }
#slider-row { display:flex; align-items:center; gap:8px; }
#slider {
  flex:1; height:3px; -webkit-appearance:none;
  background:rgba(255,255,255,.12); border-radius:2px; outline:none; cursor:pointer;
}
#slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px;
  border-radius:50%; background:#7eb8f7; cursor:pointer;
  box-shadow:0 0 6px rgba(126,184,247,.6);
}
.s-lbl { font-size:10px; color:#4466aa; min-width:20px; font-variant-numeric:tabular-nums; }

/* ── Load Overlay ── */
#overlay {
  position:fixed; inset:0;
  background:rgba(9,13,20,.97);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:200;
}
#overlay h2 { font-size:20px; color:#7eb8f7; margin-bottom:6px; }
#overlay .sub { font-size:13px; color:#4466aa; margin-bottom:22px; text-align:center; line-height:1.6; }
.obtn {
  background:rgba(126,184,247,.15); border:1px solid rgba(126,184,247,.4);
  color:#7eb8f7; border-radius:6px; padding:9px 22px;
  font-size:14px; cursor:pointer; margin:5px; transition:background .2s;
}
.obtn:hover { background:rgba(126,184,247,.3); }
#drop-hint { margin-top:14px; font-size:11px; color:#2a3a55; }

/* ── 3D Zone Labels ── */
#zone-labels { position:fixed; pointer-events:none; z-index:50; }
.zlbl {
  position:absolute; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.8px;
  padding:2px 7px; border-radius:3px;
  background:rgba(9,13,20,.7); border:1px solid rgba(255,255,255,.1);
}
</style>
</head>
<body>

<div id="canvas-wrap"></div>
<div id="zone-labels"></div>

<!-- ── Load Overlay ── -->
<div id="overlay">
  <h2>CrossDock 3D Viewer</h2>
  <p class="sub">
    먼저 <code style="color:#7eb8f7">python viz/export_simulation.py</code> 를 실행하여<br>
    <strong>simulation_data.json</strong> 을 생성한 뒤 파일을 불러오세요.
  </p>
  <label class="obtn" for="file-input">📂 파일 열기</label>
  <button class="obtn" id="demo-btn">🎬 데모 실행</button>
  <input type="file" id="file-input" accept=".json" style="position:absolute;left:-9999px;opacity:0;width:0;height:0;">
  <p id="drop-hint">이 창에 JSON 파일을 드래그 앤 드롭할 수도 있습니다</p>
</div>

<!-- ── Header ── -->
<div id="header" style="display:none">
  <h1>⬡ CrossDock Simulation 3D Viewer</h1>
  <span id="header-meta"></span>
</div>

<div id="step-panel"  class="panel" style="display:none"><div class="ptitle">Step Info</div><div id="step-info"></div></div>
<div id="metrics-panel" class="panel" style="display:none"><div class="ptitle">Metrics</div><div id="metrics-info"></div></div>
<div id="legend" class="panel" style="display:none"><div class="ptitle">Lanes</div><div id="legend-info"></div></div>

<!-- ── Timeline ── -->
<div id="timeline" style="display:none">
  <div id="ctrl-row">
    <button class="btn" id="btn-prev" title="이전 스텝 (←)">◀</button>
    <button class="btn" id="btn-play" title="재생/일시정지 (Space)">▶ Play</button>
    <button class="btn" id="btn-next" title="다음 스텝 (→)">▶</button>
    <span id="step-disp">Step 0 / 0</span>
    <span style="flex:1"></span>
    <span id="spd-lbl">2 fps</span>
    <button class="btn" id="btn-slow">−</button>
    <button class="btn" id="btn-fast">+</button>
  </div>
  <div id="slider-row">
    <span class="s-lbl">0</span>
    <input type="range" id="slider" min="0" max="100" value="0">
    <span class="s-lbl" id="s-max">100</span>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
//  Constants
// ════════════════════════════════════════════════════════════
const LANE_HEX  = [0xe74c3c, 0xe67e22, 0xf1c40f, 0x2ecc71, 0x3498db];
const LANE_CSS  = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db'];
const LANE_NAME = ['Lane A','Lane B','Lane C','Lane D','Lane E'];

// World-space layout (X = left↔right, Y = up, Z = back↔front)
const L = {
  LANE_X:     [-8, -4, 0, 4, 8],  // 5 lane columns
  DOOR_X:     [-4,  0, 4],        // 3 inbound door columns
  Z_WAIT:     -12,   // waiting truck queue
  Z_DOOR:     -5.5,  // inbound docks
  Z_BUF:       0,    // shared buffer band
  Z_QUEUE:     5,    // staging lane queue bars
  Z_OB:        10,   // outbound trucks
};

const DISPATCH_INTERVAL = 20;  // env default
const MAX_QUEUE_VIS     = 50;  // volume → full bar height
const MAX_BAR_H         = 4.5;
const MAX_BUF_W         = 17.6;

// ════════════════════════════════════════════════════════════
//  Three.js globals
// ════════════════════════════════════════════════════════════
let scene, camera, renderer, orbitCtrl;
let fo = {};   // frame objects (updatable meshes)

// ════════════════════════════════════════════════════════════
//  Playback state
// ════════════════════════════════════════════════════════════
let simData   = null;
let frame     = 0;
let playing   = false;
let fpsIdx    = 2;
const FPS_LIST = [0.5, 1, 2, 4, 8];
let lastTick  = 0;
let lerpT     = 1;  // 0..1 — interpolation progress for current frame transition

// ════════════════════════════════════════════════════════════
//  Init Three.js
// ════════════════════════════════════════════════════════════
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x090d14);
  scene.fog = new THREE.FogExp2(0x090d14, 0.018);

  camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 200);
  camera.position.set(0, 22, 28);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  orbitCtrl = new THREE.OrbitControls(camera, renderer.domElement);
  orbitCtrl.enableDamping = true;
  orbitCtrl.dampingFactor = 0.07;
  orbitCtrl.target.set(0, 1, 0);
  orbitCtrl.minDistance = 6;
  orbitCtrl.maxDistance = 70;
  orbitCtrl.maxPolarAngle = Math.PI / 2 - 0.04;
  orbitCtrl.update();

  // Lights
  scene.add(new THREE.AmbientLight(0x7788bb, 0.55));

  const sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(8, 24, 14);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  Object.assign(sun.shadow.camera, { left:-22, right:22, top:20, bottom:-20, near:0.1, far:80 });
  scene.add(sun);

  const fillLight = new THREE.DirectionalLight(0x223355, 0.4);
  fillLight.position.set(-10, 8, -12);
  scene.add(fillLight);

  buildStatic();
  buildDynamic();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function loop() {
    requestAnimationFrame(loop);
    orbitCtrl.update();
    tickPlayback();
    renderer.render(scene, camera);
  })();
}

// ════════════════════════════════════════════════════════════
//  Static geometry
// ════════════════════════════════════════════════════════════
function box(w, h, d, color, opts = {}) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color, ...opts })
  );
  if (opts.shadow !== false) { m.castShadow = true; m.receiveShadow = true; }
  return m;
}

function addBox(w, h, d, color, px, py, pz, opts = {}) {
  const m = box(w, h, d, color, opts);
  m.position.set(px, py, pz);
  scene.add(m);
  return m;
}

function floorZone(x1, x2, z1, z2, color, opacity) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(x2 - x1, z2 - z1),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: false })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set((x1 + x2) / 2, 0.003, (z1 + z2) / 2);
  scene.add(m);
}

function buildStatic() {
  // Floor
  const floorM = new THREE.MeshLambertMaterial({ color: 0x111824 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), floorM);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid
  scene.add(new THREE.GridHelper(50, 25, 0x1a2a3a, 0x161f2e));

  // Zone tints
  floorZone(-11, 11, -16, -2,  0x1a0808, 0.7);  // inbound  (red tint)
  floorZone(-11, 11, -2,   3,  0x0a1520, 0.7);  // buffer   (blue tint)
  floorZone(-11, 11,  3,  14,  0x081a0c, 0.7);  // outbound (green tint)

  // Road stripes in front (outbound exit)
  for (let i = -1; i <= 1; i += 2) {
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(0.2, 4),
      new THREE.MeshBasicMaterial({ color: 0xf1c40f, transparent: true, opacity: 0.35 })
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(i * 1.5, 0.004, 14);
    scene.add(stripe);
  }

  // Lane floor stripes (colored)
  L.LANE_X.forEach((x, i) => {
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(2.8, 11),
      new THREE.MeshBasicMaterial({ color: LANE_HEX[i], transparent: true, opacity: 0.1 })
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(x, 0.004, 6.5);
    scene.add(stripe);
  });

  // Warehouse side walls
  addBox(0.3, 5.5, 30, 0x1e2d40, -11.15, 2.75, -1, { shadow: false });
  addBox(0.3, 5.5, 30, 0x1e2d40,  11.15, 2.75, -1, { shadow: false });

  // Inbound back wall (with door cutouts — represented as pillars)
  // Columns between door openings
  [-9.5, -2, 2, 9.5].forEach(x => {
    addBox(1.5, 5.5, 0.3, 0x1e2d40, x, 2.75, -8, { shadow: false });
  });
  // Lintel above doors
  addBox(22, 0.5, 0.3, 0x1a2535, 0, 5.5, -8, { shadow: false });

  // Door frames (H structures at each door position)
  L.DOOR_X.forEach(x => {
    addBox(0.25, 4.8, 0.25, 0x2a3d55, x - 1.3, 2.4, L.Z_DOOR);
    addBox(0.25, 4.8, 0.25, 0x2a3d55, x + 1.3, 2.4, L.Z_DOOR);
    addBox(2.9,  0.25, 0.25, 0x2a3d55, x, 4.9, L.Z_DOOR);
  });

  // Buffer zone label strip
  addBox(22, 0.08, 4, 0x0d2035, 0, 0.04, L.Z_BUF, { shadow: false });
}

// ════════════════════════════════════════════════════════════
//  Dynamic geometry (updated each frame)
// ════════════════════════════════════════════════════════════
function buildDynamic() {
  // Buffer fill (geometry = 1×1×1, scaled each frame)
  {
    // Container wireframe
    const cMesh = new THREE.Mesh(
      new THREE.BoxGeometry(MAX_BUF_W + 0.3, 3.2, 3.8),
      new THREE.MeshBasicMaterial({ color: 0x2a4a6a, wireframe: true, transparent: true, opacity: 0.35 })
    );
    cMesh.position.set(0, 1.6, L.Z_BUF);
    scene.add(cMesh);

    // Fill (BoxGeometry 1×1×1, we scale X and Y each tick)
    const fMesh = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 3.4),
      new THREE.MeshLambertMaterial({ color: 0xf39c12, transparent: true, opacity: 0.85 })
    );
    fMesh.castShadow = true;
    scene.add(fMesh);
    fo.bufFill = fMesh;
  }

  // Inbound doors: status light, truck-at-dock, progress bar
  fo.doors = L.DOOR_X.map((x, i) => {
    // Status LED
    const led = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 10, 10),
      new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
    );
    led.position.set(x, 5.25, L.Z_DOOR);
    scene.add(led);

    // Point light that pulses with LED (subtle)
    const ptLight = new THREE.PointLight(0x2ecc71, 0, 6);
    ptLight.position.set(x, 5.0, L.Z_DOOR);
    scene.add(ptLight);

    // Truck-at-dock mesh
    const truck = box(2.4, 1.9, 4, 0x7f8c8d, { transparent: true, opacity: 0.85 });
    truck.position.set(x, 0.95, L.Z_DOOR - 0.3);
    truck.visible = false;
    truck.castShadow = true;
    scene.add(truck);

    // Cab (front accent)
    const cab = addBox(2.4, 1.9, 0.5, 0x55667a, x, 0.95, L.Z_DOOR - 2.55);
    cab.visible = false;
    cab.castShadow = true;

    // Progress bar background
    const pbBg = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 0.18, 0.18),
      new THREE.MeshBasicMaterial({ color: 0x0d1a2a })
    );
    pbBg.position.set(x, 5.55, L.Z_DOOR);
    scene.add(pbBg);

    // Progress bar fill (scale.x + reposition)
    const pbFill = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.18, 0.18),
      new THREE.MeshBasicMaterial({ color: 0xe67e22 })
    );
    pbFill.position.set(x, 5.55, L.Z_DOOR + 0.01);
    scene.add(pbFill);

    return { led, ptLight, truck, cab, pbFill };
  });

  // Waiting truck pool (15 slots)
  fo.waitPool = Array.from({ length: 15 }, () => {
    const m = box(1.9, 1.5, 3.4, 0x556688, { transparent: true, opacity: 0.8 });
    m.visible = false;
    m.castShadow = true;
    scene.add(m);
    return m;
  });

  // Lane queue bars + outbound trucks
  fo.lanes = L.LANE_X.map((x, i) => {
    // Queue bar (scale.y each frame; pivot at bottom via position.y = height/2)
    const qBar = box(2.5, 1, 2.8, LANE_HEX[i], { transparent: true, opacity: 0.85 });
    qBar.castShadow = true;
    scene.add(qBar);

    // Outbound truck body
    const ob = box(2.4, 1.95, 4.2, LANE_HEX[i], { transparent: true, opacity: 0.45 });
    ob.position.set(x, 0.975, L.Z_OB);
    ob.castShadow = true;
    scene.add(ob);

    // Outbound truck cab
    addBox(2.4, 1.95, 0.6, 0x1a2535, x, 0.975, L.Z_OB + 2.55);

    // Lane label strip (thin colored band at outbound truck top)
    const badge = addBox(2.4, 0.12, 4.2, LANE_HEX[i], x, 1.99, L.Z_OB);
    badge.material.transparent = true;
    badge.material.opacity = 0.6;

    // Fill bar (scale.x left-to-right; base w=1, positioned per lerp)
    const fillBar = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.28, 3.8),
      new THREE.MeshLambertMaterial({ color: 0x2ecc71 })
    );
    fillBar.castShadow = false;
    scene.add(fillBar);

    // Departure timer bar (thin, below rear of ob truck)
    const tmBg = new THREE.Mesh(
      new THREE.BoxGeometry(2.4, 0.13, 0.13),
      new THREE.MeshBasicMaterial({ color: 0x0d1a2a })
    );
    tmBg.position.set(x, 0.065, L.Z_OB + 2.2);
    scene.add(tmBg);

    const tmFill = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.13, 0.13),
      new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
    );
    scene.add(tmFill);

    return { qBar, ob, fillBar, tmFill };
  });

  // Action request lines (lane → door, one per lane)
  fo.actionLines = L.LANE_X.map((x, i) => {
    const pts = [new THREE.Vector3(x, 1.5, L.Z_OB), new THREE.Vector3(x, 1.5, L.Z_DOOR)];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
      color: LANE_HEX[i], transparent: true, opacity: 0, linewidth: 1
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    return { line, mat };
  });
}

// ════════════════════════════════════════════════════════════
//  Frame rendering
// ════════════════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }
function rgb(r, g, b)   { return new THREE.Color(r / 255, g / 255, b / 255); }
function lerpColor(c1, c2, t) { return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)]; }

// green=[46,204,113]  red=[231,76,60]  yellow=[241,196,15]
const C_GREEN  = [46, 204, 113];
const C_RED    = [231, 76, 60];
const C_YELLOW = [241, 196, 15];

function renderFrame(fi, t) {
  if (!simData) return;
  const f  = simData.frames[fi];
  const fp = fi > 0 ? simData.frames[fi - 1] : f;

  // ── Buffer fill ──
  {
    const ratio  = lerp(fp.buffer / fp.buffer_capacity, f.buffer / f.buffer_capacity, t);
    const w      = Math.max(ratio * MAX_BUF_W, 0.02);
    const h      = Math.max(ratio * 2.8, 0.06);
    fo.bufFill.scale.set(w, h, 1);
    fo.bufFill.position.set(-MAX_BUF_W / 2 + w / 2, h / 2 + 0.05, L.Z_BUF);
    const [r, g, b] = lerpColor(C_GREEN, C_RED, ratio);
    fo.bufFill.material.color.set(rgb(r, g, b));
  }

  // ── Inbound doors ──
  f.doors.forEach((door, i) => {
    const { led, ptLight, truck, cab, pbFill } = fo.doors[i];

    if (door.is_busy) {
      led.material.color.set(0xe74c3c);
      ptLight.color.set(0xe74c3c);
      ptLight.intensity = 1.2;

      truck.visible = true;
      cab.visible   = true;
      const lc = door.assigned_lane >= 0 ? LANE_HEX[door.assigned_lane] : 0x7f8c8d;
      truck.material.color.set(lc);
      cab.material.color.set(lc);

      // Progress bar: (10 - remaining) / 10 (10 = max_door_processing)
      const progress = Math.max(1 - door.remaining_time / 10, 0.02);
      pbFill.scale.x = progress * 2.6;
      pbFill.position.x = L.DOOR_X[i] - 1.3 + (progress * 2.6) / 2;
    } else {
      led.material.color.set(0x2ecc71);
      ptLight.color.set(0x2ecc71);
      ptLight.intensity = 0;
      truck.visible = false;
      cab.visible   = false;
      pbFill.scale.x = 0.01;
    }
  });

  // ── Waiting trucks ──
  f.waiting_trucks.forEach((wt, i) => {
    if (i >= fo.waitPool.length) return;
    const m   = fo.waitPool[i];
    const row = Math.floor(i / 5);
    const col = i % 5;
    m.visible = true;
    m.position.set((col - 2) * 3.8, 0.75, L.Z_WAIT - row * 4.2);
    const primary = primaryLane(wt.shipments);
    m.material.color.set(primary >= 0 ? LANE_HEX[primary] : 0x556688);
  });
  for (let i = f.waiting_trucks.length; i < fo.waitPool.length; i++) {
    fo.waitPool[i].visible = false;
  }

  // ── Lanes ──
  f.lanes.forEach((lane, i) => {
    const prev   = fp.lanes[i];
    const lObj   = fo.lanes[i];
    const x      = L.LANE_X[i];

    // Queue bar
    const qRatio = lerp(prev.queue_volume / MAX_QUEUE_VIS, lane.queue_volume / MAX_QUEUE_VIS, t);
    const barH   = Math.max(qRatio * MAX_BAR_H, 0.06);
    lObj.qBar.scale.set(1, barH, 1);
    lObj.qBar.position.set(x, barH / 2, L.Z_QUEUE);
    const [qr, qg, qb] = lerpColor(C_GREEN, C_RED, lane.congestion);
    lObj.qBar.material.color.set(rgb(qr, qg, qb));

    // Outbound truck opacity = fill level
    const fillR = lerp(prev.outbound_fill_rate, lane.outbound_fill_rate, t);
    lObj.ob.material.opacity = 0.3 + 0.6 * fillR;

    // Fill bar (grows left to right on top of ob truck)
    const fw = Math.max(fillR * 2.4, 0.02);
    lObj.fillBar.scale.x = fw;
    lObj.fillBar.position.set(x - 1.2 + fw / 2, 2.09, L.Z_OB);
    const [fr, fg, fb] = lerpColor(C_RED, C_GREEN, fillR);
    lObj.fillBar.material.color.set(rgb(fr, fg, fb));

    // Departure timer bar (shrinks as time runs out)
    const tmRatio = lane.outbound_departure_timer / DISPATCH_INTERVAL;
    const tw = Math.max(tmRatio * 2.4, 0.02);
    lObj.tmFill.scale.x = tw;
    lObj.tmFill.position.set(x - 1.2 + tw / 2, 0.065, L.Z_OB + 2.2 + 0.01);
    const [tr, tg] = lerpColor(C_RED, C_GREEN, tmRatio);
    lObj.tmFill.material.color.set(rgb(tr, tg, 60));
  });

  // ── Action request lines (current frame only, no lerp) ──
  f.lanes.forEach((lane, i) => {
    const action = f.actions[i];
    const { line, mat } = fo.actionLines[i];
    if (action > 0 && action <= 3) {
      const doorIdx = action - 1;
      const pts = line.geometry.attributes.position;
      pts.setXYZ(0, L.LANE_X[i], 2.5, L.Z_OB);
      pts.setXYZ(1, L.DOOR_X[doorIdx], 2.5, L.Z_DOOR);
      pts.needsUpdate = true;
      mat.opacity = 0.55;
    } else {
      mat.opacity = 0;
    }
  });
}

function primaryLane(shipments) {
  let best = -1, bestVol = -1;
  for (const [k, v] of Object.entries(shipments)) {
    if (v > bestVol) { bestVol = v; best = parseInt(k); }
  }
  return best;
}

// ════════════════════════════════════════════════════════════
//  Playback tick
// ════════════════════════════════════════════════════════════
function tickPlayback() {
  if (!playing || !simData) return;
  const now = performance.now();
  const dur = 1000 / FPS_LIST[fpsIdx];
  lerpT = Math.min((now - lastTick) / dur, 1);
  renderFrame(frame, lerpT);

  if (lerpT >= 1) {
    frame++;
    if (frame >= simData.frames.length) {
      frame = simData.frames.length - 1;
      playing = false;
      document.getElementById('btn-play').textContent = '▶ Play';
    }
    lastTick = now;
    lerpT = 0;
    syncSlider();
    updatePanels(frame);
  }
}

// ════════════════════════════════════════════════════════════
//  UI panels
// ════════════════════════════════════════════════════════════
function updatePanels(fi) {
  if (!simData) return;
  const f = simData.frames[fi];

  // Step display
  document.getElementById('step-disp').textContent = `Step ${f.t} / ${simData.frames.length - 1}`;

  // Step panel
  const doorRows = f.doors.map((d, i) => {
    const busy  = d.is_busy;
    const col   = busy ? (d.assigned_lane >= 0 ? LANE_CSS[d.assigned_lane] : '#e74c3c') : '#2ecc71';
    const label = busy
      ? `처리중 · 레인 ${d.assigned_lane} · ${d.remaining_time}s`
      : '유휴';
    return `<div class="door-row">
      <div class="door-dot" style="background:${col};${busy ? `box-shadow:0 0 5px ${col}` : ''}"></div>
      <span class="door-txt">도어 ${i}: ${label}</span>
    </div>`;
  }).join('');

  const bufRatio = f.buffer / f.buffer_capacity;
  const bufColor = bufRatio > 0.8 ? '#e74c3c' : bufRatio > 0.5 ? '#f39c12' : '#2ecc71';
  document.getElementById('step-info').innerHTML = `
    <div class="row"><span class="lbl">스텝</span><span class="val">${f.t}</span></div>
    <div class="row"><span class="lbl">버퍼</span><span class="val" style="color:${bufColor}">${f.buffer.toFixed(0)} / ${f.buffer_capacity}</span></div>
    <div class="bar-wrap"><div class="bar" style="width:${(bufRatio*100).toFixed(1)}%;background:${bufColor}"></div></div>
    <div class="row"><span class="lbl">대기 트럭</span><span class="val">${f.waiting_trucks.length} 대</span></div>
    <div style="margin-top:8px"><div class="ptitle" style="margin-bottom:6px">인바운드 도어</div>${doorRows}</div>
  `;

  // Metrics panel
  const m      = f.metrics;
  const avgFR  = m.outbound_departures > 0 ? (m.total_fill_rate / m.outbound_departures * 100) : 0;
  const doorUtil = m.total_steps > 0 ? (m.door_busy_steps / (m.total_steps * 3) * 100) : 0;
  const ovColor  = m.buffer_overflow_count > 0 ? '#e74c3c' : '#2ecc71';
  const emColor  = m.empty_departures > 0 ? '#e74c3c' : '#2ecc71';
  document.getElementById('metrics-info').innerHTML = `
    <div class="row"><span class="lbl">총 처리량</span><span class="val">${m.total_throughput.toFixed(0)}</span></div>
    <div class="row"><span class="lbl">평균 탑재율</span><span class="val">${avgFR.toFixed(1)}%</span></div>
    <div class="bar-wrap"><div class="bar" style="width:${avgFR.toFixed(1)}%;background:#2ecc71"></div></div>
    <div class="row"><span class="lbl">아웃바운드 출발</span><span class="val">${m.outbound_departures}</span></div>
    <div class="row"><span class="lbl">공차 출발</span><span class="val" style="color:${emColor}">${m.empty_departures}</span></div>
    <div class="row"><span class="lbl">버퍼 오버플로우</span><span class="val" style="color:${ovColor}">${m.buffer_overflow_count}</span></div>
    <div class="row"><span class="lbl">도어 활용률</span><span class="val">${doorUtil.toFixed(1)}%</span></div>
  `;

  // Legend / Lane panel
  document.getElementById('legend-info').innerHTML = f.lanes.map((lane, i) => {
    const fr = (lane.outbound_fill_rate * 100).toFixed(0);
    const q  = lane.queue_volume.toFixed(0);
    const t  = lane.outbound_departure_timer;
    return `<div class="lane-row">
      <div class="lane-dot" style="background:${LANE_CSS[i]}"></div>
      <span class="lane-txt">${LANE_NAME[i]}  Q=${q.padStart(3)}  OB=${fr.padStart(3)}%  [${String(t).padStart(2)}s]</span>
    </div>`;
  }).join('');
}

function syncSlider() {
  document.getElementById('slider').value = frame;
  updatePanels(frame);
}

// ════════════════════════════════════════════════════════════
//  Data loading
// ════════════════════════════════════════════════════════════
function loadData(data) {
  simData = data;
  frame   = 0;
  playing = false;
  lerpT   = 1;
  document.getElementById('btn-play').textContent = '▶ Play';

  const { meta } = data;
  document.getElementById('header-meta').textContent =
    `Policy: ${meta.policy}  ·  Seed: ${meta.seed}  ·  ${meta.num_steps} steps`;

  const slider = document.getElementById('slider');
  slider.max = data.frames.length - 1;
  slider.value = 0;
  document.getElementById('s-max').textContent = data.frames.length - 1;

  // Show UI
  document.getElementById('overlay').style.display = 'none';
  ['header','step-panel','metrics-panel','legend','timeline'].forEach(id => {
    document.getElementById(id).style.display = id === 'header' ? 'flex' : 'block';
  });

  renderFrame(0, 1);
  updatePanels(0);
}

// ── Demo data generator ──
function makeDemo() {
  const N = 50;
  const frames = [];
  let buf = 20;
  const qv = [8, 15, 5, 20, 10];
  const ob = [25, 10, 35, 5, 40];

  for (let t = 0; t <= N; t++) {
    buf = Math.min(150, Math.max(0, buf + (Math.random() * 16 - 5)));
    for (let i = 0; i < 5; i++) {
      qv[i] = Math.max(0, qv[i] + (Math.random() * 10 - 3));
      ob[i] = Math.min(50, Math.max(0, ob[i] + (Math.random() * 8 - 2)));
    }
    const departures = Math.floor(t / 4);
    frames.push({
      t, buffer: buf, buffer_capacity: 150,
      waiting_trucks: Array.from({ length: Math.floor(Math.random() * 5) }, (_, j) => ({
        arrival_time: t - j,
        shipments: { [j % 5]: 10, [(j + 2) % 5]: 8 },
        total_volume: 18,
      })),
      doors: [0, 1, 2].map(i => ({
        door_id: i,
        is_busy: Math.random() > 0.45,
        remaining_time: Math.floor(Math.random() * 9) + 1,
        assigned_lane: Math.floor(Math.random() * 5),
        assigned_truck_volume: 20,
        assigned_truck_shipments: { '0': 10, '1': 10 },
      })),
      lanes: [0, 1, 2, 3, 4].map(i => ({
        lane_id: i,
        queue_volume: qv[i],
        congestion: Math.min(qv[i] / 50, 1),
        outbound_loaded: ob[i],
        outbound_fill_rate: ob[i] / 50,
        outbound_departure_timer: Math.max(1, DISPATCH_INTERVAL - (t % DISPATCH_INTERVAL)),
        outbound_capacity: 50,
      })),
      actions: [0, 1, 0, 2, 0],
      rewards: [1.2, 0.8, 1.5, 0.3, 1.0],
      metrics: {
        total_throughput: t * 12,
        total_fill_rate: departures * 0.68,
        outbound_departures: departures,
        empty_departures: Math.floor(departures * 0.1),
        buffer_overflow_count: Math.max(0, Math.floor(t / 25)),
        door_busy_steps: t * 2,
        total_steps: t,
        dwell_time_sum: t * 3, dwell_count: Math.max(1, t),
      },
    });
  }
  return { meta: { policy: 'demo', seed: 0, num_steps: N + 1, num_lanes: 5, num_doors: 3 }, frames };
}

// ════════════════════════════════════════════════════════════
//  Event wiring
// ════════════════════════════════════════════════════════════
function wireUI() {
  const fileInput = document.getElementById('file-input');

  fileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { loadData(JSON.parse(ev.target.result)); }
      catch (err) { alert('JSON 파싱 오류: ' + err.message); }
    };
    r.readAsText(file);
  };

  document.getElementById('demo-btn').onclick = () => loadData(makeDemo());

  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { loadData(JSON.parse(ev.target.result)); }
      catch (err) { alert('JSON 파싱 오류: ' + err.message); }
    };
    r.readAsText(file);
  });

  document.getElementById('btn-play').onclick = () => {
    if (!simData) return;
    playing = !playing;
    document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
    if (playing) { lastTick = performance.now(); lerpT = 0; }
  };

  document.getElementById('btn-prev').onclick = () => {
    if (!simData) return;
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    frame = Math.max(0, frame - 1);
    renderFrame(frame, 1); syncSlider();
  };

  document.getElementById('btn-next').onclick = () => {
    if (!simData) return;
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    frame = Math.min(simData.frames.length - 1, frame + 1);
    renderFrame(frame, 1); syncSlider();
  };

  document.getElementById('btn-slow').onclick = () => {
    fpsIdx = Math.max(0, fpsIdx - 1);
    document.getElementById('spd-lbl').textContent = `${FPS_LIST[fpsIdx]} fps`;
  };
  document.getElementById('btn-fast').onclick = () => {
    fpsIdx = Math.min(FPS_LIST.length - 1, fpsIdx + 1);
    document.getElementById('spd-lbl').textContent = `${FPS_LIST[fpsIdx]} fps`;
  };

  document.getElementById('slider').oninput = e => {
    if (!simData) return;
    playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    frame = parseInt(e.target.value);
    renderFrame(frame, 1);
    updatePanels(frame);
  };

  document.addEventListener('keydown', e => {
    if (!simData) return;
    if (e.key === ' ')          { e.preventDefault(); document.getElementById('btn-play').click(); }
    else if (e.key === 'ArrowLeft')  document.getElementById('btn-prev').click();
    else if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
  });
}

// ════════════════════════════════════════════════════════════
//  Boot
// ════════════════════════════════════════════════════════════
initThree();
wireUI();
</script>
